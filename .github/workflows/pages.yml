# main へプッシュ時に docs/（Astro）をビルドし GitHub Pages に公開する。
# リポジトリ Settings → Pages → Source を「GitHub Actions」に設定してください。
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build site
        working-directory: docs
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
          PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          # ユーザー/組織の <name>.github.io リポジトリでルート公開する場合は空にし、astro.config の base を調整してください。
          PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          PUBLIC_DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/latest/download/SmartRenamer.zip
          PUBLIC_MACOS_DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/latest/download/SmartRenamer-macos.zip
          PUBLIC_GITHUB_URL: https://github.com/${{ github.repository }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
