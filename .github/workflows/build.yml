# main プッシュ: テストのみ（Linux）。
# v* タグプッシュ: テスト成功後に Windows でビルドし GitHub Release へ単一 .exe を公開。
name: CI / CD

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest

  build-and-release:
    name: Build and Release (Windows)
    needs: test
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Build single-file executable
        run: >
          uv run pyinstaller
          --noconfirm
          --clean
          --name renamer
          --windowed
          --onefile
          --paths src
          --collect-all PySide6
          --collect-all shiboken6
          src/app/main.py

      - name: Create GitHub Release and upload renamer.exe
        uses: softprops/action-gh-release@v2
        with:
          files: dist/renamer.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
