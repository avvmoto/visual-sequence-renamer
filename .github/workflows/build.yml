# main プッシュ: テストのみ（Linux）。
# build/** プッシュ: テスト成功後に Windows でビルドし Artifact に .exe を保存。
# v* タグプッシュ: テスト成功後に Windows でビルドし GitHub Release へ単一 .exe を公開。
name: CI / CD

# Node.js 20 ベースの composite action 警告回避（2026 年以降の runner 既定は Node 24）。
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - "build/**"
    tags:
      - "v*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-groups

      # PySide6 / pytest-qt が QtGui 読み込み時に libEGL 等を要求する（ヘッドレスでも共有ライブラリが必要）
      - name: Install Qt EGL / XCB dependencies (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0

      - name: Run tests
        run: uv run pytest

  build-and-release:
    name: Build and Release (Windows)
    needs: test
    runs-on: windows-latest
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/heads/build/')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Build single-file executable
        run: >
          uv run pyinstaller
          --noconfirm
          --clean
          --name renamer
          --windowed
          --onefile
          --paths src
          --collect-all PySide6
          --collect-all shiboken6
          src/app/main.py

      - name: Create GitHub Release and upload renamer.exe
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: dist/renamer.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows executable (branch build)
        if: startsWith(github.ref, 'refs/heads/build/')
        uses: actions/upload-artifact@v7
        with:
          name: renamer-windows-${{ github.sha }}
          path: dist/renamer.exe
          if-no-files-found: error
          retention-days: 30
