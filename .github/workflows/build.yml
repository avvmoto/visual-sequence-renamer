# main プッシュ: テスト・監査・Semantic Release（タグ生成）。
# build/** プッシュ: テスト成功後に Windows / macOS をビルドし Artifact に ZIP を保存。
# v* タグプッシュ: テスト成功後に両 OS をビルドし、GitHub Release に ZIP を添付しビルド証明を付与。
name: CI / CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - "build/**"
    tags:
      - "v*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies (dev / build / audit)
        run: uv sync --group dev --group build

      # 引数なしで uv.lock 全体を監査（dev / build などロックに含まれるグループも対象）
      - name: Audit Python dependencies (uv)
        run: uv audit

      - name: Setup Node.js (docs audit)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Audit docs dependencies (npm)
        working-directory: docs
        run: npm ci && npm audit

      - name: Install Qt EGL / XCB dependencies (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0

      - name: Run tests
        run: uv run pytest

  semantic-release:
    name: Semantic Release
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install release tooling
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  build-windows:
    name: Build (Windows)
    needs: test
    runs-on: windows-latest
    permissions:
      contents: read
      actions: write
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/heads/build/')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies (runtime + PyInstaller)
        run: uv sync --group build

      - name: Build single-file executable
        run: uv run pyinstaller --noconfirm --clean VisualSequenceRenamer.spec

      - name: Create VisualSequenceRenamer.zip
        shell: pwsh
        run: |
          if (-not (Test-Path dist/VisualSequenceRenamer.exe)) { throw "dist/VisualSequenceRenamer.exe not found" }
          Compress-Archive -LiteralPath dist/VisualSequenceRenamer.exe -DestinationPath dist/VisualSequenceRenamer.zip -Force

      - name: Upload for release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-windows
          path: dist/VisualSequenceRenamer.zip
          if-no-files-found: error

      - name: Upload Windows build (branch)
        if: startsWith(github.ref, 'refs/heads/build/')
        uses: actions/upload-artifact@v4
        with:
          name: visualsequencerenamer-windows-${{ github.sha }}
          path: dist/VisualSequenceRenamer.zip
          if-no-files-found: error
          retention-days: 30

  build-macos:
    name: Build (macOS)
    needs: test
    runs-on: macos-latest
    permissions:
      contents: read
      actions: write
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/heads/build/')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies (runtime + PyInstaller)
        run: uv sync --group build

      - name: Build macOS .app bundle
        run: uv run pyinstaller --noconfirm --clean VisualSequenceRenamer_macos.spec

      - name: Create VisualSequenceRenamer-macos.zip
        run: |
          test -d dist/VisualSequenceRenamer.app
          ditto -c -k --keepParent dist/VisualSequenceRenamer.app dist/VisualSequenceRenamer-macos.zip

      - name: Upload for release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-macos
          path: dist/VisualSequenceRenamer-macos.zip
          if-no-files-found: error

      - name: Upload macOS build (branch)
        if: startsWith(github.ref, 'refs/heads/build/')
        uses: actions/upload-artifact@v4
        with:
          name: visualsequencerenamer-macos-${{ github.sha }}
          path: dist/VisualSequenceRenamer-macos.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      actions: read
      id-token: write
      attestations: write
    steps:
      - name: Download Windows asset
        uses: actions/download-artifact@v4
        with:
          name: release-asset-windows
          path: release-assets

      - name: Download macOS asset
        uses: actions/download-artifact@v4
        with:
          name: release-asset-macos
          path: release-assets

      - name: Attest build provenance (Sigstore)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            release-assets/VisualSequenceRenamer.zip
            release-assets/VisualSequenceRenamer-macos.zip

      - name: Upload release assets
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            release-assets/VisualSequenceRenamer.zip
            release-assets/VisualSequenceRenamer-macos.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
