# main プッシュ: テストのみ（Linux）。
# build/** プッシュ: テスト成功後に Windows / macOS をビルドし Artifact に ZIP を保存。
# v* タグプッシュ: テスト成功後に両 OS をビルドし、1 つの GitHub Release に両 ZIP を添付。
name: CI / CD

# Node.js 20 ベースの composite action 警告回避（2026 年以降の runner 既定は Node 24）。
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - "build/**"
    tags:
      - "v*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies (dev / test)
        run: uv sync --group dev

      # PySide6 / pytest-qt が QtGui 読み込み時に libEGL 等を要求する（ヘッドレスでも共有ライブラリが必要）
      - name: Install Qt EGL / XCB dependencies (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0

      - name: Run tests
        run: uv run pytest

  build-windows:
    name: Build (Windows)
    needs: test
    runs-on: windows-latest
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/heads/build/')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies (runtime + PyInstaller)
        run: uv sync --group build

      - name: Build single-file executable
        run: uv run pyinstaller --noconfirm --clean SmartRenamer.spec

      - name: Create SmartRenamer.zip
        shell: pwsh
        run: |
          if (-not (Test-Path dist/SmartRenamer.exe)) { throw "dist/SmartRenamer.exe not found" }
          Compress-Archive -LiteralPath dist/SmartRenamer.exe -DestinationPath dist/SmartRenamer.zip -Force

      - name: Upload for release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-windows
          path: dist/SmartRenamer.zip
          if-no-files-found: error

      - name: Upload Windows build (branch)
        if: startsWith(github.ref, 'refs/heads/build/')
        uses: actions/upload-artifact@v4
        with:
          name: smartrenamer-windows-${{ github.sha }}
          path: dist/SmartRenamer.zip
          if-no-files-found: error
          retention-days: 30

  build-macos:
    name: Build (macOS)
    needs: test
    runs-on: macos-latest
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/heads/build/')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies (runtime + PyInstaller)
        run: uv sync --group build

      - name: Build macOS .app bundle
        run: uv run pyinstaller --noconfirm --clean SmartRenamer_macos.spec

      - name: Create SmartRenamer-macos.zip
        run: |
          test -d dist/SmartRenamer.app
          ditto -c -k --keepParent dist/SmartRenamer.app dist/SmartRenamer-macos.zip

      - name: Upload for release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-macos
          path: dist/SmartRenamer-macos.zip
          if-no-files-found: error

      - name: Upload macOS build (branch)
        if: startsWith(github.ref, 'refs/heads/build/')
        uses: actions/upload-artifact@v4
        with:
          name: smartrenamer-macos-${{ github.sha }}
          path: dist/SmartRenamer-macos.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows asset
        uses: actions/download-artifact@v4
        with:
          name: release-asset-windows
          path: release-assets

      - name: Download macOS asset
        uses: actions/download-artifact@v4
        with:
          name: release-asset-macos
          path: release-assets

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            release-assets/SmartRenamer.zip
            release-assets/SmartRenamer-macos.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
