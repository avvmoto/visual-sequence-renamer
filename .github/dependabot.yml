version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      all-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "build(deps)"

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
      day: monday
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      all-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "build(deps)"
