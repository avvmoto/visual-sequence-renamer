version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      all-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "build(deps)"

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
      day: monday
    groups:
      all-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "build(deps)"
